<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CoachBus · Coach</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-tactile { min-height: 56px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 600; }
        .list-item { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative">
    <header class="p-4 border-b flex justify-between items-center bg-white">
        <h1 class="text-xl font-bold text-blue-600">🚌 CoachBus</h1>
        <div id="user-info" class="text-sm"></div>
        <button id="logout-btn" class="text-gray-500">↪️</button>
    </header>
    <main id="content" class="p-4"></main>
</div>

<script>
    (function(){
        const userStr = localStorage.getItem('coachbus_user');
        if (!userStr) window.location.href = 'index.html';
        const currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'coach') window.location.href = 'admin.html';

        const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentAppelId = null, currentBus = null, enfantsList = [];
        let appelsEnCours = new Map();

        document.getElementById('user-info').innerHTML = `${currentUser.nom} <span class="bg-green-100 text-green-800 px-2 py-0.5 rounded-full text-xs ml-2">Coach</span>`;
        document.getElementById('logout-btn').addEventListener('click', ()=>{
            localStorage.removeItem('coachbus_user');
            window.location.href='index.html';
        });

        function showView(v){ v==='select-bus' ? renderSelectBus() : renderAppel(); }

        function renderSelectBus(){
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[70vh] space-y-6">
                    <h2 class="text-xl font-semibold">Bonjour ${currentUser.nom}</h2>
                    <button id="bus1" class="w-full bg-green-500 text-white btn-tactile rounded-xl py-6 text-2xl">🚌 BUS 1</button>
                    <button id="bus2" class="w-full bg-blue-500 text-white btn-tactile rounded-xl py-6 text-2xl">🚌 BUS 2</button>
                </div>`;
            document.getElementById('bus1').onclick = ()=>startAppel('1');
            document.getElementById('bus2').onclick = ()=>startAppel('2');
        }

        async function startAppel(busNum){
            currentBus=busNum;
            document.getElementById('content').innerHTML=`<div class="text-center py-20">Chargement...</div>`;
            try{
                const {data: appel, error} = await supabase.from('Appels').insert([{
                    Date: new Date().toISOString().split('T')[0], Bus_Num: parseInt(busNum), Coach_ID: currentUser.id, Terminé: false
                }]).select().single();
                if(error) throw error;
                currentAppelId = appel.ID;
                const {data: enfants, error: errEnf} = await supabase.from('Enfants').select('*').order('Nom');
                if(errEnf) throw errEnf;
                enfantsList = enfants||[];
                appelsEnCours.clear();
                enfantsList.forEach(e=> appelsEnCours.set(e.ID, {statut: e.Absent_Precoché?'Absent':null, commentaire:''}));
                showView('appel');
            }catch(e){ alert('Erreur appel'); renderSelectBus(); }
        }

        function renderAppel(){
            let items='';
            enfantsList.forEach(e=>{
                const d = appelsEnCours.get(e.ID)||{};
                const present = d.statut==='Présent', absent = d.statut==='Absent';
                items+=`<div class="list-item" data-id="${e.ID}">
                    <div class="flex justify-between"><div><b>${e.Prenom} ${e.Nom}</b> (${e.Âge||'?'} ans)
                    ${e.Allergies?`<div class="text-red-500 text-xs">⚠️ ${e.Allergies}</div>`:''}
                    ${e.Absent_Precoché?'<span class="bg-yellow-100 text-xs px-2 py-1 rounded">Signalé absent</span>':''}</div>
                    <div class="flex gap-2"><button class="present-btn px-4 py-2 rounded ${present?'bg-green-500 text-white':'bg-gray-200'}">Présent</button>
                    <button class="absent-btn px-4 py-2 rounded ${absent?'bg-red-500 text-white':'bg-gray-200'}">Absent</button></div></div>
                    <input type="text" placeholder="Commentaire" class="comment-input w-full mt-2 p-2 border rounded" value="${d.commentaire||''}">
                </div>`;
            });
            const presents = Array.from(appelsEnCours.values()).filter(v=>v.statut==='Présent').length;
            const absents = Array.from(appelsEnCours.values()).filter(v=>v.statut==='Absent').length;
            document.getElementById('content').innerHTML = `
                <h2 class="text-xl font-bold mb-4">Appel Bus ${currentBus}</h2>
                <div class="grid grid-cols-3 gap-2 mb-4"><div class="bg-green-100 p-2 rounded text-center">${presents} Présents</div><div class="bg-red-100 p-2 rounded text-center">${absents} Absents</div><div class="bg-gray-100 p-2 rounded text-center">${enfantsList.length-presents-absents} Restants</div></div>
                <div class="space-y-1 mb-24">${items}</div>
                <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white border-t"><button id="valider" class="w-full bg-blue-600 text-white btn-tactile rounded-lg py-4">Valider l'appel</button></div>`;
            document.querySelectorAll('.present-btn').forEach(b=>b.onclick=e=>updateStatut(e,'Présent'));
            document.querySelectorAll('.absent-btn').forEach(b=>b.onclick=e=>updateStatut(e,'Absent'));
            document.querySelectorAll('.comment-input').forEach(i=>i.oninput=e=>updateComment(e));
            document.getElementById('valider').onclick=validerAppel;
        }

        function updateStatut(e,statut){ const id=parseInt(e.target.closest('[data-id]').dataset.id); const cur=appelsEnCours.get(id)||{}; cur.statut=statut; appelsEnCours.set(id,cur); renderAppel(); }
        function updateComment(e){ const id=parseInt(e.target.closest('[data-id]').dataset.id); const cur=appelsEnCours.get(id)||{}; cur.commentaire=e.target.value; appelsEnCours.set(id,cur); }

        async function validerAppel(){
            for(let e of enfantsList) if(!appelsEnCours.get(e.ID)?.statut) return alert('Statut manquant pour '+e.Prenom);
            if(!confirm('Valider ?')) return;
            document.getElementById('content').innerHTML=`<div class="text-center py-20">Enregistrement...</div>`;
            const lignes = [];
            for(let e of enfantsList){ const d=appelsEnCours.get(e.ID); lignes.push({ID_Appel:currentAppelId, ID_Enfant:e.ID, Statut:d.statut, Commentaire:d.commentaire||null}); }
            await supabase.from('Lignes_Appel').insert(lignes);
            await supabase.from('Appels').update({Terminé:true, Heure_Validation:new Date().toISOString()}).eq('ID',currentAppelId);
            alert('Validé !');
            currentAppelId=null;
            renderSelectBus();
        }

        renderSelectBus();
    })();
</script>
</body>
</html>
