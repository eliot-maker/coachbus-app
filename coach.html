<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CoachBus - Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .btn-tactile { min-height: 56px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 600; }
        .list-item { min-height: 60px; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50">

<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative">
    <header class="p-4 border-b flex justify-between items-center bg-white">
        <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-bus mr-2"></i>CoachBus</h1>
        <div id="user-info" class="text-sm"></div>
        <button id="logout-btn" class="text-gray-500"><i class="fas fa-sign-out-alt"></i></button>
    </header>
    <main id="content" class="p-4"></main>
</div>

<script>
    // Vérifier si connecté en tant que coach
    const userStr = localStorage.getItem('coachbus_user');
    if (!userStr) {
        window.location.href = 'index.html';
    }
    const currentUser = JSON.parse(userStr);
    if (currentUser.role !== 'coach') {
        // Si admin, rediriger vers admin
        window.location.href = 'admin.html';
    }

    const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentAppelId = null;
    let currentBus = null;
    let enfantsList = [];
    let appelsEnCours = new Map(); // enfantId -> { statut, commentaire }

    // Affichage info user
    document.getElementById('user-info').innerHTML = `
        <span class="font-medium">${currentUser.nom}</span>
        <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full ml-2">Coach</span>
    `;

    document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.removeItem('coachbus_user');
        window.location.href = 'index.html';
    });

    // Vues
    function showView(viewName) {
        switch(viewName) {
            case 'select-bus': renderSelectBus(); break;
            case 'appel': renderAppel(); break;
            default: renderSelectBus();
        }
    }

    function renderSelectBus() {
        document.getElementById('content').innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-[70vh] space-y-6">
                <h2 class="text-xl font-semibold">Bonjour ${currentUser.nom}</h2>
                <p class="text-gray-600">Choisissez le bus :</p>
                <button id="bus1" class="w-full bg-green-500 text-white btn-tactile rounded-xl py-6 text-2xl"><i class="fas fa-bus mr-3"></i>BUS 1</button>
                <button id="bus2" class="w-full bg-blue-500 text-white btn-tactile rounded-xl py-6 text-2xl"><i class="fas fa-bus mr-3"></i>BUS 2</button>
            </div>
        `;
        document.getElementById('bus1').addEventListener('click', () => startAppel('1'));
        document.getElementById('bus2').addEventListener('click', () => startAppel('2'));
    }

    async function startAppel(busNum) {
        currentBus = busNum;
        document.getElementById('content').innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-2">Préparation...</p></div>`;
        try {
            const { data: appel, error } = await supabase.from('Appels').insert([{
                Date: new Date().toISOString().split('T')[0],
                Bus_Num: parseInt(busNum),
                Coach_ID: currentUser.id,
                Terminé: false
            }]).select().single();
            if (error) throw error;
            currentAppelId = appel.ID;

            const { data: enfants, error: errEnf } = await supabase.from('Enfants').select('*').order('Nom');
            if (errEnf) throw errEnf;
            enfantsList = enfants || [];
            appelsEnCours.clear();
            enfantsList.forEach(e => {
                appelsEnCours.set(e.ID, { statut: e.Absent_Precoché ? 'Absent' : null, commentaire: '' });
            });
            showView('appel');
        } catch (e) {
            alert('Erreur création appel : ' + e.message);
            showView('select-bus');
        }
    }

    function renderAppel() {
        let items = '';
        enfantsList.forEach(e => {
            const data = appelsEnCours.get(e.ID) || { statut: null, commentaire: '' };
            const present = data.statut === 'Présent';
            const absent = data.statut === 'Absent';
            items += `
                <div class="list-item" data-id="${e.ID}">
                    <div class="flex justify-between">
                        <div>
                            <span class="font-medium">${e.Prenom} ${e.Nom}</span>
                            <span class="text-sm text-gray-500 ml-2">(${e.Âge} ans)</span>
                            ${e.Allergies ? `<div class="text-xs text-red-600"><i class="fas fa-exclamation-triangle"></i> ${e.Allergies}</div>` : ''}
                            ${e.Absent_Precoché ? '<span class="text-xs bg-yellow-100 px-2 py-1 rounded">⚠️ Signalé absent</span>' : ''}
                        </div>
                        <div class="flex space-x-2">
                            <button class="present-btn px-3 py-2 rounded ${present ? 'bg-green-500 text-white' : 'bg-gray-200'}" data-id="${e.ID}"><i class="fas fa-check"></i> Présent</button>
                            <button class="absent-btn px-3 py-2 rounded ${absent ? 'bg-red-500 text-white' : 'bg-gray-200'}" data-id="${e.ID}"><i class="fas fa-times"></i> Absent</button>
                        </div>
                    </div>
                    <input type="text" placeholder="Commentaire" class="comment-input w-full mt-2 p-2 border rounded" value="${data.commentaire || ''}" data-id="${e.ID}">
                </div>
            `;
        });

        const presents = Array.from(appelsEnCours.values()).filter(v => v.statut === 'Présent').length;
        const absents = Array.from(appelsEnCours.values()).filter(v => v.statut === 'Absent').length;

        document.getElementById('content').innerHTML = `
            <div class="mb-4">
                <h2 class="text-xl font-bold"><i class="fas fa-clipboard-list mr-2 text-blue-600"></i>Appel Bus ${currentBus}</h2>
                <div class="grid grid-cols-3 gap-2 mt-4">
                    <div class="bg-green-100 p-2 rounded text-center"><span class="font-bold">${presents}</span> Présents</div>
                    <div class="bg-red-100 p-2 rounded text-center"><span class="font-bold">${absents}</span> Absents</div>
                    <div class="bg-gray-100 p-2 rounded text-center"><span class="font-bold">${enfantsList.length - presents - absents}</span> À faire</div>
                </div>
            </div>
            <div class="space-y-1 mb-24">${items}</div>
            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white border-t">
                <button id="valider-btn" class="w-full bg-blue-600 text-white btn-tactile rounded-lg py-4">Valider l'appel</button>
            </div>
        `;

        // Écouteurs
        document.querySelectorAll('.present-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.id);
            const cur = appelsEnCours.get(id) || { commentaire: '' };
            cur.statut = 'Présent';
            appelsEnCours.set(id, cur);
            renderAppel();
        }));
        document.querySelectorAll('.absent-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.id);
            const cur = appelsEnCours.get(id) || { commentaire: '' };
            cur.statut = 'Absent';
            appelsEnCours.set(id, cur);
            renderAppel();
        }));
        document.querySelectorAll('.comment-input').forEach(inp => inp.addEventListener('input', (e) => {
            const id = parseInt(e.target.dataset.id);
            const cur = appelsEnCours.get(id) || { statut: null };
            cur.commentaire = e.target.value;
            appelsEnCours.set(id, cur);
        }));

        document.getElementById('valider-btn').addEventListener('click', async () => {
            for (let e of enfantsList) {
                if (!appelsEnCours.get(e.ID)?.statut) {
                    alert(`Statut manquant pour ${e.Prenom} ${e.Nom}`);
                    return;
                }
            }
            if (!confirm('Valider cet appel ?')) return;

            document.getElementById('content').innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-3xl"></i><p>Enregistrement...</p></div>`;
            try {
                const lignes = [];
                for (let e of enfantsList) {
                    const d = appelsEnCours.get(e.ID);
                    lignes.push({ ID_Appel: currentAppelId, ID_Enfant: e.ID, Statut: d.statut, Commentaire: d.commentaire || null });
                }
                await supabase.from('Lignes_Appel').insert(lignes);
                await supabase.from('Appels').update({ Terminé: true, Heure_Validation: new Date().toISOString() }).eq('ID', currentAppelId);
                alert('✅ Appel validé !');
                currentAppelId = null;
                showView('select-bus');
            } catch (e) {
                alert('Erreur : ' + e.message);
                renderAppel();
            }
        });
    }

    // Démarrer sur sélection du bus
    showView('select-bus');
</script>
</body>
</html>
