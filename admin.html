<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachBus · Admin</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.btn-tactile{min-height:56px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:600}@media print{header,button,.no-print{display:none!important}.print-only{display:block!important}}</style>
</head>
<body class="bg-gray-50">
<div class="max-w-md mx-auto min-h-screen bg-white shadow-xl">
    <header class="p-4 border-b flex justify-between"><h1 class="text-xl font-bold text-blue-600">🚌 CoachBus</h1><div id="user-info"></div><button id="logout">↪️</button></header>
    <main id="content" class="p-4"></main>
</div>
<div class="print-only p-4"><h2>Rapport</h2><div id="print-date"></div><div id="print-bus"></div><table><tbody id="print-tbody"></tbody></table></div>
<script>
    (function(){
        const u=JSON.parse(localStorage.getItem('coachbus_user')||'{}');
        if(!u.role||(u.role!=='admin'&&u.role!=='super-admin')) window.location.href='index.html';
        const supabase = window.supabase.createClient('https://otuymkznwiidookrqfhd.supabase.co','sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF');
        document.getElementById('user-info').innerHTML=`${u.nom} <span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full text-xs">Admin</span>`;
        document.getElementById('logout').onclick=()=>{localStorage.removeItem('coachbus_user');location='index.html';};

        function showView(v){ v==='dashboard'?renderDashboard():v==='enfants'?renderEnfants():renderRapports(); }
        function renderDashboard(){
            document.getElementById('content').innerHTML=`<div class="space-y-4"><h2 class="text-2xl font-bold text-center">Admin</h2><button id="btn-enfants" class="w-full bg-indigo-500 text-white btn-tactile rounded-xl py-6">👥 Gérer enfants</button><button id="btn-rapports" class="w-full bg-green-500 text-white btn-tactile rounded-xl py-6">🖨️ Rapports</button></div>`;
            document.getElementById('btn-enfants').onclick=()=>showView('enfants');
            document.getElementById('btn-rapports').onclick=()=>showView('rapports');
        }
        async function renderEnfants(){
            document.getElementById('content').innerHTML=`<div class="text-center py-10">Chargement...</div>`;
            const {data:enfants}=await supabase.from('Enfants').select('*').order('Nom');
            let rows=''; enfants.forEach(e=>rows+=`<tr><td>${e.Nom} ${e.Prenom}</td><td>${e.Âge||'-'}</td><td>${e.Allergies||''}</td><td><input type="checkbox" ${e.Absent_Precoché?'checked':''} data-id="${e.ID}" class="precoch"></td><td><button class="delete text-red-500" data-id="${e.ID}">🗑️</button></td></tr>`);
            document.getElementById('content').innerHTML=`<button id="back" class="mb-4 text-blue-600">← Retour</button><h3>Enfants</h3><table class="w-full">${rows}</table><hr class="my-4"><h4>Ajouter</h4><form id="add"><input id="nom" placeholder="Nom" required><input id="prenom" placeholder="Prénom" required><input id="age" placeholder="Âge"><input id="groupe" placeholder="Groupe"><input id="allergies" placeholder="Allergies"><button type="submit" class="bg-blue-600 text-white p-3 rounded">Ajouter</button></form>`;
            document.getElementById('back').onclick=()=>showView('dashboard');
            document.querySelectorAll('.precoch').forEach(cb=>cb.onchange=async e=>await supabase.from('Enfants').update({Absent_Precoché:e.target.checked}).eq('ID',e.target.dataset.id));
            document.querySelectorAll('.delete').forEach(b=>b.onclick=async e=>{if(confirm('Supprimer ?')){await supabase.from('Enfants').delete().eq('ID',e.target.dataset.id);renderEnfants();}});
            document.getElementById('add').onsubmit=async e=>{e.preventDefault(); const f={Nom:document.getElementById('nom').value, Prenom:document.getElementById('prenom').value, Âge:parseInt(document.getElementById('age').value)||null, Groupe:document.getElementById('groupe').value, Allergies:document.getElementById('allergies').value, Absent_Precoché:false}; await supabase.from('Enfants').insert([f]); renderEnfants();};
        }
        async function renderRapports(){
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('content').innerHTML=`<div class="text-center py-10">Chargement...</div>`;
            const {data:appels}=await supabase.from('Appels').select('*, Coachs(Nom)').eq('Date',today).eq('Terminé',true);
            if(!appels?.length) return document.getElementById('content').innerHTML=`<p>Aucun appel</p><button id="back">Retour</button>`;
            let opts=''; appels.forEach(a=>opts+=`<option value="${a.ID}">Bus ${a.Bus_Num} - ${a.Coachs?.Nom}</option>`);
            document.getElementById('content').innerHTML=`<button id="back">← Retour</button><h3>Rapport du ${today}</h3><select id="sel">${opts}</select><button id="print" class="w-full bg-green-600 text-white btn-tactile mt-4">Imprimer</button>`;
            document.getElementById('back').onclick=()=>showView('dashboard');
            document.getElementById('print').onclick=async ()=>{
                const id=document.getElementById('sel').value;
                const {data:appel}=await supabase.from('Appels').select('*, Coachs(Nom)').eq('ID',id).single();
                const {data:lignes}=await supabase.from('Lignes_Appel').select('*, Enfants(*)').eq('ID_Appel',id);
                document.getElementById('print-date').innerText=new Date(appel.Date).toLocaleDateString('fr-FR');
                document.getElementById('print-bus').innerHTML=`Bus ${appel.Bus_Num} - Coach ${appel.Coachs?.Nom}`;
                const tbody=document.getElementById('print-tbody'); tbody.innerHTML='';
                lignes.forEach(l=>tbody.innerHTML+=`<tr><td>${l.Enfants?.Prenom} ${l.Enfants?.Nom}</td><td>${l.Statut}</td><td>${l.Commentaire||''}</td></tr>`);
                window.print();
            };
        }
        renderDashboard();
    })();
</script>
</body>
</html>
