<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#3b82f6">
    <title>CoachBus - Présences</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json,{name:'CoachBus',short_name:'CoachBus',start_url:'.',display:'standalone',background_color:'%23ffffff',theme_color:'%233b82f6',icons:[{src:'https://cdn-icons-png.flaticon.com/512/3097/3097180.png',sizes:'512x512',type:'image/png'}]}">
    
    <style>
        /* Styles d'impression */
        @media print {
            .no-print, header, nav, button:not(.print-keep), .bg-gray-50, .bg-white, .shadow, .rounded-lg, .fixed {
                display: none !important;
            }
            body, html {
                background: white;
                font-size: 12pt;
                padding: 0.5cm;
            }
            .print-only { 
                display: block !important; 
            }
            .print-table { 
                display: table !important; 
                width: 100%; 
                border-collapse: collapse;
            }
            .print-table th, .print-table td {
                border: 1px solid #ddd;
                padding: 8px;
                text-align: left;
            }
            .print-header {
                display: flex !important;
                justify-content: space-between;
                margin-bottom: 20px;
                font-size: 16pt;
                font-weight: bold;
            }
        }
        .print-only { display: none; }
        
        /* Optimisation tactile */
        .btn-tactile {
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.1s ease;
            touch-action: manipulation;
            cursor: pointer;
            user-select: none;
        }
        .btn-tactile:active {
            transform: scale(0.98);
            opacity: 0.8;
        }
        .list-item {
            min-height: 60px;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            touch-action: manipulation;
        }
        body {
            background-color: #f9fafb;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative">
    <header id="main-header" class="p-4 border-b border-gray-200 flex justify-between items-center bg-white no-print">
        <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-bus mr-2"></i>CoachBus</h1>
        <div id="user-info" class="text-sm text-gray-600"></div>
        <button id="logout-btn" class="text-gray-500 hover:text-red-500 p-2" style="display: none;"><i class="fas fa-sign-out-alt"></i></button>
    </header>
    <main id="content" class="p-4"></main>
</div>

<!-- Template d'impression (caché à l'écran) -->
<div id="print-template" class="print-only container mx-auto p-4">
    <div class="print-header"><span>📋 Rapport de Présence - CoachBus</span><span id="print-date"></span></div>
    <div id="print-bus-info" class="mb-4 text-lg"></div>
    <table class="print-table">
        <thead><tr><th>Enfant</th><th>Âge</th><th>Groupe</th><th>Allergies</th><th>Statut</th><th>Commentaire</th></tr></thead>
        <tbody id="print-tbody"></tbody>
    </table>
    <div class="print-footer" style="margin-top:20px;font-size:10pt;color:#666;">Document généré le <span id="print-generation-date"></span></div>
</div>

<script>
    // ===================== CONFIGURATION SUPABASE =====================
    const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
    
    // Initialisation
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // État global
    let currentUser = null;
    let currentRole = null;
    let currentAppelId = null;
    let currentBus = null;
    let enfantsList = [];
    let appelsEnCours = new Map(); // enfantId -> { statut, commentaire }

    // ===================== AFFICHAGE DES VUES =====================
    function showView(viewName) {
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        
        if (currentUser) {
            const roleBadge = {
                'super-admin': '🔧 Super Admin',
                'admin': '📊 Admin',
                'coach': '🚌 Coach'
            }[currentRole] || currentRole;
            
            userInfo.innerHTML = `
                <div class="flex items-center space-x-2">
                    <span class="font-medium">${currentUser.nom || currentUser.identifiant_simple}</span>
                    <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full">${roleBadge}</span>
                </div>
            `;
            logoutBtn.style.display = 'block';
        } else {
            userInfo.innerHTML = '';
            logoutBtn.style.display = 'none';
        }

        switch(viewName) {
            case 'login': renderLogin(); break;
            case 'select-bus': renderSelectBus(); break;
            case 'appel': renderAppel(); break;
            case 'admin-dashboard': renderAdminDashboard(); break;
            case 'admin-enfants': renderAdminEnfants(); break;
            case 'admin-rapports': renderAdminRapports(); break;
            default: renderLogin();
        }
    }

    async function logout() {
        if (confirm('Se déconnecter ?')) {
            currentUser = null; currentRole = null; currentAppelId = null; currentBus = null;
            enfantsList = []; appelsEnCours.clear();
            showView('login');
        }
    }

    // ===================== AUTHENTIFICATION =====================
    async function handleLogin(identifiant) {
        if (!identifiant.trim()) return alert('Veuillez entrer votre identifiant');
        
        document.getElementById('content').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner loading-spinner text-3xl text-blue-600 mb-2"></i><p>Connexion...</p></div>`;

        // Super admin (hardcodé)
        if (identifiant.toLowerCase() === 'superadmin') {
            currentUser = { id: 'super', identifiant_simple: 'superadmin', nom: 'Super Admin' };
            currentRole = 'super-admin';
            showView('admin-dashboard');
            return;
        }

        try {
            const { data: coach, error } = await supabase
                .from('Coachs')
                .select('*')
                .eq('Identifiant_Simple', identifiant.trim())
                .maybeSingle();

            if (error) {
                if (error.code === '42P01') {
                    alert('❌ Les tables ne sont pas créées. Exécute le script SQL dans Supabase.');
                } else {
                    alert('Erreur base de données : ' + error.message);
                }
                showView('login');
                return;
            }

            if (!coach) {
                alert('Identifiant inconnu');
                showView('login');
                return;
            }

            currentUser = { id: coach.ID, identifiant_simple: coach.Identifiant_Simple, nom: coach.Nom };
            currentRole = coach.Role || 'coach';
            
            if (currentRole === 'admin' || currentRole === 'super-admin') {
                showView('admin-dashboard');
            } else {
                showView('select-bus');
            }
        } catch (e) {
            alert('Erreur : ' + e.message);
            showView('login');
        }
    }

    // ===================== VUE LOGIN =====================
    function renderLogin() {
        const html = `
            <div class="flex flex-col items-center justify-center min-h-[70vh]">
                <div class="w-full max-w-sm">
                    <div class="text-center mb-8">
                        <div class="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-bus text-5xl text-blue-600"></i>
                        </div>
                        <h2 class="text-2xl font-bold">Coach du Samedi</h2>
                        <p class="text-gray-500">Entrez votre identifiant</p>
                    </div>
                    <input type="text" id="identifiant-input" placeholder="ex: julien, marie" class="w-full p-4 border rounded-lg text-lg mb-4" autofocus autocomplete="off">
                    <button id="login-submit" class="w-full bg-blue-600 text-white btn-tactile rounded-lg shadow-md">
                        <i class="fas fa-arrow-right mr-2"></i> Accéder
                    </button>
                    <p class="text-xs text-center mt-6 text-gray-400">superadmin, marie, julien, sophie</p>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
        const input = document.getElementById('identifiant-input');
        const btn = document.getElementById('login-submit');
        btn.addEventListener('click', () => handleLogin(input.value));
        input.addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(input.value); });
    }

    // ===================== COACH : SÉLECTION BUS =====================
    function renderSelectBus() {
        const html = `
            <div class="flex flex-col items-center justify-center min-h-[70vh] space-y-6">
                <h2 class="text-xl font-semibold">Bonjour ${currentUser.nom || currentUser.identifiant_simple}</h2>
                <p class="text-gray-600">Choisissez le bus :</p>
                <button id="bus1-btn" class="w-full bg-green-500 text-white btn-tactile rounded-xl py-6 text-2xl"><i class="fas fa-bus mr-3"></i>BUS 1</button>
                <button id="bus2-btn" class="w-full bg-blue-500 text-white btn-tactile rounded-xl py-6 text-2xl"><i class="fas fa-bus mr-3"></i>BUS 2</button>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
        document.getElementById('bus1-btn').addEventListener('click', () => startAppel('1'));
        document.getElementById('bus2-btn').addEventListener('click', () => startAppel('2'));
    }

    async function startAppel(busNum) {
        currentBus = busNum;
        document.getElementById('content').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner loading-spinner text-3xl mb-2"></i><p>Préparation de l'appel...</p></div>`;
        try {
            const { data: appel, error } = await supabase.from('Appels').insert([{
                Date: new Date().toISOString().split('T')[0],
                Bus_Num: parseInt(busNum),
                Coach_ID: currentUser.id,
                Terminé: false
            }]).select().single();
            if (error) throw error;
            currentAppelId = appel.ID;

            const { data: enfants, error: errEnf } = await supabase.from('Enfants').select('*').order('Nom');
            if (errEnf) throw errEnf;
            enfantsList = enfants || [];
            appelsEnCours.clear();
            enfantsList.forEach(e => {
                appelsEnCours.set(e.ID, { statut: e.Absent_Precoché ? 'Absent' : null, commentaire: '' });
            });
            showView('appel');
        } catch (e) {
            alert('Erreur création appel : ' + e.message);
            showView('select-bus');
        }
    }

    // ===================== VUE APPEL =====================
    function renderAppel() {
        let itemsHtml = '';
        enfantsList.forEach(enfant => {
            const data = appelsEnCours.get(enfant.ID) || { statut: null, commentaire: '' };
            const isPresent = data.statut === 'Présent';
            const isAbsent = data.statut === 'Absent';
            itemsHtml += `
                <div class="list-item flex flex-col bg-white" data-enfant-id="${enfant.ID}">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="font-medium text-lg">${enfant.Prenom} ${enfant.Nom} <span class="text-sm text-gray-500">(${enfant.Âge || '?'} ans)</span></div>
                            ${enfant.Allergies ? `<div class="text-xs text-red-600"><i class="fas fa-exclamation-triangle mr-1"></i>${enfant.Allergies}</div>` : ''}
                            ${enfant.Absent_Precoché ? '<span class="inline-block text-xs bg-yellow-100 px-2 py-1 rounded mt-1">⚠️ Signalé absent</span>' : ''}
                        </div>
                        <div class="flex space-x-2">
                            <button class="statut-btn present-btn px-4 py-2 rounded-lg font-bold ${isPresent ? 'bg-green-500 text-white' : 'bg-gray-200'}"><i class="fas fa-check mr-1"></i>Présent</button>
                            <button class="statut-btn absent-btn px-4 py-2 rounded-lg font-bold ${isAbsent ? 'bg-red-500 text-white' : 'bg-gray-200'}"><i class="fas fa-times mr-1"></i>Absent</button>
                        </div>
                    </div>
                    <div class="mt-3">
                        <input type="text" placeholder="Commentaire" class="comment-input w-full p-2 border rounded-lg text-sm" value="${data.commentaire || ''}">
                    </div>
                </div>
            `;
        });

        const presents = Array.from(appelsEnCours.values()).filter(v => v.statut === 'Présent').length;
        const absents = Array.from(appelsEnCours.values()).filter(v => v.statut === 'Absent').length;
        const restants = enfantsList.length - presents - absents;

        const html = `
            <div class="mb-4">
                <h2 class="text-xl font-bold"><i class="fas fa-clipboard-list mr-2 text-blue-600"></i>Appel Bus ${currentBus}</h2>
                <div class="grid grid-cols-3 gap-2 mt-4">
                    <div class="bg-green-100 rounded-lg p-3 text-center"><span class="text-2xl font-bold text-green-700">${presents}</span><div class="text-xs">Présents</div></div>
                    <div class="bg-red-100 rounded-lg p-3 text-center"><span class="text-2xl font-bold text-red-700">${absents}</span><div class="text-xs">Absents</div></div>
                    <div class="bg-gray-100 rounded-lg p-3 text-center"><span class="text-2xl font-bold text-gray-700">${restants}</span><div class="text-xs">À valider</div></div>
                </div>
            </div>
            <div class="space-y-1 mb-24">${itemsHtml}</div>
            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white border-t border-gray-200 no-print">
                <button id="valider-appel-btn" class="w-full bg-blue-600 text-white btn-tactile rounded-lg py-4 text-lg shadow-md">
                    <i class="fas fa-check-circle mr-2"></i>Valider l'appel (${presents + absents}/${enfantsList.length})
                </button>
            </div>
        `;
        document.getElementById('content').innerHTML = html;

        document.querySelectorAll('.present-btn').forEach(btn => btn.addEventListener('click', e => {
            const id = parseInt(e.target.closest('[data-enfant-id]').dataset.enfantId);
            const cur = appelsEnCours.get(id) || { commentaire: '' };
            cur.statut = 'Présent';
            appelsEnCours.set(id, cur);
            renderAppel();
        }));
        document.querySelectorAll('.absent-btn').forEach(btn => btn.addEventListener('click', e => {
            const id = parseInt(e.target.closest('[data-enfant-id]').dataset.enfantId);
            const cur = appelsEnCours.get(id) || { commentaire: '' };
            cur.statut = 'Absent';
            appelsEnCours.set(id, cur);
            renderAppel();
        }));
        document.querySelectorAll('.comment-input').forEach(inp => inp.addEventListener('input', e => {
            const id = parseInt(e.target.closest('[data-enfant-id]').dataset.enfantId);
            const cur = appelsEnCours.get(id) || { statut: null };
            cur.commentaire = e.target.value;
            appelsEnCours.set(id, cur);
        }));
        document.getElementById('valider-appel-btn').addEventListener('click', validerAppel);
    }

    async function validerAppel() {
        for (let e of enfantsList) {
            if (!appelsEnCours.get(e.ID)?.statut) {
                alert(`❌ Statut manquant pour ${e.Prenom} ${e.Nom}`);
                return;
            }
        }
        if (!confirm('Confirmer la validation de cet appel ?')) return;
        
        document.getElementById('content').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner loading-spinner text-3xl mb-2"></i><p>Enregistrement...</p></div>`;
        try {
            const lignes = [];
            for (let e of enfantsList) {
                const d = appelsEnCours.get(e.ID);
                lignes.push({ ID_Appel: currentAppelId, ID_Enfant: e.ID, Statut: d.statut, Commentaire: d.commentaire || null });
            }
            await supabase.from('Lignes_Appel').insert(lignes);
            await supabase.from('Appels').update({ Terminé: true, Heure_Validation: new Date().toISOString() }).eq('ID', currentAppelId);
            alert('✅ Appel validé !');
            currentAppelId = null;
            showView('select-bus');
        } catch (e) {
            alert('Erreur validation : ' + e.message);
            showView('appel');
        }
    }

    // ===================== ADMIN DASHBOARD =====================
    function renderAdminDashboard() {
        const html = `
            <div class="space-y-6">
                <h2 class="text-2xl font-bold text-center">Administration</h2>
                <button id="admin-enfants-btn" class="w-full bg-indigo-500 text-white btn-tactile rounded-xl py-6 text-xl"><i class="fas fa-users mr-2"></i>Gérer les enfants</button>
                <button id="admin-rapports-btn" class="w-full bg-green-500 text-white btn-tactile rounded-xl py-6 text-xl"><i class="fas fa-print mr-2"></i>Rapports du jour</button>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
        document.getElementById('admin-enfants-btn').addEventListener('click', () => showView('admin-enfants'));
        document.getElementById('admin-rapports-btn').addEventListener('click', () => showView('admin-rapports'));
    }

    // ===================== GESTION DES ENFANTS (ADMIN) =====================
    async function renderAdminEnfants() {
        document.getElementById('content').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner loading-spinner"></i> Chargement...</div>`;
        try {
            const { data: enfants, error } = await supabase.from('Enfants').select('*').order('Nom');
            if (error) throw error;
            
            let rows = '';
            enfants.forEach(e => {
                rows += `<tr><td class="py-2">${e.Nom} ${e.Prenom}</td><td>${e.Âge||'-'}</td><td>${e.Allergies||''}</td>
                    <td><input type="checkbox" ${e.Absent_Precoché?'checked':''} data-id="${e.ID}" class="precoch-check"></td>
                    <td><button class="delete-enfant text-red-500" data-id="${e.ID}"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            
            const html = `
                <div class="mb-4 flex justify-between"><h3 class="text-xl font-bold">Liste des enfants</h3><button id="back-dash" class="text-blue-600"><i class="fas fa-arrow-left"></i> Retour</button></div>
                <div class="overflow-x-auto mb-6"><table class="w-full text-sm"><thead><tr><th>Nom</th><th>Âge</th><th>Allergies</th><th>Absent précoché</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
                <div class="border-t pt-6"><h4 class="font-semibold mb-2">Ajouter un enfant</h4>
                    <form id="add-enfant-form" class="space-y-2">
                        <div class="grid grid-cols-2 gap-2"><input type="text" id="new-nom" placeholder="Nom" class="p-2 border rounded" required><input type="text" id="new-prenom" placeholder="Prénom" class="p-2 border rounded" required></div>
                        <div class="grid grid-cols-2 gap-2"><input type="number" id="new-age" placeholder="Âge" class="p-2 border rounded"><input type="text" id="new-groupe" placeholder="Groupe" class="p-2 border rounded"></div>
                        <input type="text" id="new-allergies" placeholder="Allergies" class="w-full p-2 border rounded">
                        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded">Ajouter</button>
                    </form>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            document.getElementById('back-dash').addEventListener('click', () => showView('admin-dashboard'));
            
            document.querySelectorAll('.precoch-check').forEach(cb => cb.addEventListener('change', async e => {
                await supabase.from('Enfants').update({ Absent_Precoché: e.target.checked }).eq('ID', e.target.dataset.id);
            }));
            document.querySelectorAll('.delete-enfant').forEach(btn => btn.addEventListener('click', async e => {
                if (confirm('Supprimer ?')) {
                    await supabase.from('Enfants').delete().eq('ID', e.currentTarget.dataset.id);
                    renderAdminEnfants();
                }
            }));
            document.getElementById('add-enfant-form').addEventListener('submit', async e => {
                e.preventDefault();
                const data = {
                    Nom: document.getElementById('new-nom').value,
                    Prenom: document.getElementById('new-prenom').value,
                    Âge: parseInt(document.getElementById('new-age').value) || null,
                    Groupe: document.getElementById('new-groupe').value,
                    Allergies: document.getElementById('new-allergies').value,
                    Absent_Precoché: false
                };
                await supabase.from('Enfants').insert([data]);
                renderAdminEnfants();
            });
        } catch (e) {
            alert('Erreur : ' + e.message);
            showView('admin-dashboard');
        }
    }

    // ===================== RAPPORTS (ADMIN) =====================
    async function renderAdminRapports() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('content').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner loading-spinner"></i> Chargement...</div>`;
        try {
            const { data: appels, error } = await supabase.from('Appels').select('*, Coachs(Nom)').eq('Date', today).eq('Terminé', true);
            if (error) throw error;
            if (!appels || appels.length === 0) {
                document.getElementById('content').innerHTML = `<p class="text-center py-10">Aucun appel terminé aujourd'hui.</p><button id="back-dash2" class="mt-4 text-blue-600"><i class="fas fa-arrow-left"></i> Retour</button>`;
                document.getElementById('back-dash2').addEventListener('click', () => showView('admin-dashboard'));
                return;
            }
            let options = '';
            appels.forEach(a => options += `<option value="${a.ID}">Bus ${a.Bus_Num} - ${a.Coachs?.Nom || '?'}</option>`);
            const html = `
                <button id="back-dash2" class="mb-4 text-blue-600"><i class="fas fa-arrow-left"></i> Retour</button>
                <h3 class="text-xl font-bold mb-4">Rapports du ${new Date(today).toLocaleDateString('fr-FR')}</h3>
                <select id="appel-select" class="w-full p-3 border rounded mb-4">${options}</select>
                <button id="preview-print" class="w-full bg-green-600 text-white btn-tactile rounded-lg"><i class="fas fa-print mr-2"></i>Préparer l'impression</button>
            `;
            document.getElementById('content').innerHTML = html;
            document.getElementById('back-dash2').addEventListener('click', () => showView('admin-dashboard'));
            document.getElementById('preview-print').addEventListener('click', async () => {
                const appelId = document.getElementById('appel-select').value;
                await preparePrintView(appelId);
            });
        } catch (e) {
            alert('Erreur : ' + e.message);
            showView('admin-dashboard');
        }
    }

    async function preparePrintView(appelId) {
        try {
            const { data: appel } = await supabase.from('Appels').select('*, Coachs(Nom)').eq('ID', appelId).single();
            const { data: lignes } = await supabase.from('Lignes_Appel').select('*, Enfants(*)').eq('ID_Appel', appelId);
            
            document.getElementById('print-date').innerText = new Date(appel.Date).toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
            document.getElementById('print-bus-info').innerHTML = `🚌 Bus ${appel.Bus_Num} | Coach: ${appel.Coachs?.Nom || '?'} | Validé à ${appel.Heure_Validation ? new Date(appel.Heure_Validation).toLocaleTimeString('fr-FR') : ''}`;
            document.getElementById('print-generation-date').innerText = new Date().toLocaleString('fr-FR');
            
            const tbody = document.getElementById('print-tbody');
            tbody.innerHTML = '';
            lignes.forEach(l => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${l.Enfants?.Prenom} ${l.Enfants?.Nom}</td><td>${l.Enfants?.Âge||'-'}</td><td>${l.Enfants?.Groupe||'-'}</td><td>${l.Enfants?.Allergies||''}</td><td>${l.Statut}</td><td>${l.Commentaire||''}</td>`;
                tbody.appendChild(row);
            });
            window.print();
        } catch (e) {
            alert('Erreur impression : ' + e.message);
        }
    }

    // ===================== DÉMARRAGE =====================
    document.addEventListener('DOMContentLoaded', () => {
        showView('login');
        document.getElementById('logout-btn').addEventListener('click', logout);
    });
</script>
</body>
</html>
