<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachBus - Diagnostic</title>
    <!-- Tailwind pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<div id="app" class="max-w-md mx-auto bg-white min-h-screen p-4 shadow">
    <!-- Le contenu est injecté immédiatement par JavaScript -->
</div>

<script>
    (function() {
        // --- CONFIGURATION (TES CLÉS) ---
        const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
        
        // Référence à l'élément principal
        const app = document.getElementById('app');
        
        // État minimal
        let supabase;
        let currentUser = null;
        let currentRole = null;
        
        // --- Fonction pour afficher un message d'erreur visible ---
        function showError(title, message) {
            app.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                    <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-3"></i>
                    <h2 class="text-xl font-bold text-red-800 mb-2">${title}</h2>
                    <p class="text-red-700 mb-4">${message}</p>
                    <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-2 rounded">Réessayer</button>
                </div>
            `;
        }
        
        // --- Initialisation du client Supabase (avec capture d'erreur) ---
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Client Supabase initialisé');
        } catch(e) {
            showError('Erreur Supabase', 'Impossible de créer le client : ' + e.message);
            return; // Stoppe tout
        }
        
        // --- Rendu de l'écran de connexion (affiché immédiatement) ---
        function renderLogin() {
            let html = `
                <div class="flex flex-col justify-center min-h-[80vh]">
                    <div class="text-center mb-8">
                        <i class="fas fa-bus text-5xl text-blue-600 mb-3"></i>
                        <h1 class="text-2xl font-bold">CoachBus</h1>
                        <p class="text-gray-600">Entrez votre identifiant</p>
                        <div id="connection-badge" class="mt-2 text-xs inline-block px-3 py-1 rounded-full bg-gray-200 text-gray-700">
                            <i class="fas fa-sync-alt fa-spin mr-1"></i>Test connexion...
                        </div>
                    </div>
                    <input type="text" id="login-input" placeholder="Votre identifiant" class="w-full p-4 border rounded-lg text-lg mb-4" autofocus autocomplete="off">
                    <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-lg shadow">
                        <i class="fas fa-arrow-right mr-2"></i>Accéder
                    </button>
                    <p class="text-xs text-center text-gray-400 mt-6">
                        <i class="fas fa-info-circle mr-1"></i> superadmin, julien, marie, sophie
                    </p>
                    <button id="test-direct" class="mt-4 text-sm text-blue-500 underline">Tester l'accès direct à Supabase</button>
                </div>
            `;
            app.innerHTML = html;
            
            // Test de connexion en arrière-plan (ne bloque pas l'affichage)
            const badge = document.getElementById('connection-badge');
            supabase.from('Coachs').select('count', { count: 'exact', head: true })
                .then(({ error }) => {
                    if (error) {
                        badge.className = 'mt-2 text-xs inline-block px-3 py-1 rounded-full bg-red-100 text-red-800';
                        badge.innerHTML = `<i class="fas fa-times-circle mr-1"></i>Erreur: ${error.message}`;
                        console.error('Erreur Supabase:', error);
                    } else {
                        badge.className = 'mt-2 text-xs inline-block px-3 py-1 rounded-full bg-green-100 text-green-800';
                        badge.innerHTML = '<i class="fas fa-check-circle mr-1"></i>Connecté à Supabase';
                    }
                });
            
            // Écouteurs
            document.getElementById('login-btn').addEventListener('click', () => {
                const val = document.getElementById('login-input').value.trim();
                handleLogin(val);
            });
            
            document.getElementById('login-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    document.getElementById('login-btn').click();
                }
            });
            
            document.getElementById('test-direct').addEventListener('click', async () => {
                app.innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-2">Test en cours...</p></div>`;
                try {
                    const { data, error } = await supabase.from('Coachs').select('*').limit(1);
                    if (error) throw error;
                    app.innerHTML = `
                        <div class="bg-green-50 p-6 rounded-lg">
                            <h3 class="font-bold text-green-800">✅ Connexion réussie</h3>
                            <p>La table "Coachs" existe et est accessible.</p>
                            <pre class="mt-2 bg-gray-100 p-2 rounded text-xs">${JSON.stringify(data, null, 2)}</pre>
                            <button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Retour</button>
                        </div>
                    `;
                } catch(e) {
                    app.innerHTML = `
                        <div class="bg-red-50 p-6 rounded-lg">
                            <h3 class="font-bold text-red-800">❌ Échec du test</h3>
                            <p>${e.message}</p>
                            <p class="mt-2 text-sm">Code: ${e.code || 'inconnu'}</p>
                            <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded">Retour</button>
                        </div>
                    `;
                }
            });
        }
        
        // --- Gestion de la connexion ---
        async function handleLogin(identifiant) {
            if (!identifiant) return alert('Veuillez entrer un identifiant');
            
            // Super admin (hardcodé)
            if (identifiant.toLowerCase() === 'superadmin') {
                currentUser = { id: 'super', identifiant_simple: 'superadmin', nom: 'Super Admin' };
                currentRole = 'super-admin';
                renderSimpleDashboard();
                return;
            }
            
            // Afficher chargement
            app.innerHTML = `<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-2">Connexion...</p></div>`;
            
            try {
                const { data: coach, error } = await supabase
                    .from('Coachs')
                    .select('*')
                    .eq('Identifiant_Simple', identifiant)
                    .maybeSingle();
                    
                if (error) {
                    if (error.code === '42P01') {
                        showError('Table manquante', 'La table "Coachs" n\'existe pas. Exécute le script SQL dans Supabase.');
                    } else {
                        showError('Erreur base de données', error.message);
                    }
                    return;
                }
                
                if (!coach) {
                    alert('Identifiant inconnu');
                    renderLogin();
                    return;
                }
                
                currentUser = { id: coach.ID, identifiant_simple: coach.Identifiant_Simple, nom: coach.Nom };
                currentRole = coach.Role || 'coach';
                
                // Affichage simple selon le rôle
                renderSimpleDashboard();
                
            } catch (e) {
                showError('Erreur inattendue', e.message);
            }
        }
        
        // --- Tableau de bord simplifié (juste pour confirmer que la connexion fonctionne) ---
        function renderSimpleDashboard() {
            const roleText = currentRole === 'super-admin' ? 'Super Admin' : (currentRole === 'admin' ? 'Administrateur' : 'Coach');
            app.innerHTML = `
                <div class="text-center py-10">
                    <i class="fas fa-user-check text-5xl text-green-500 mb-4"></i>
                    <h2 class="text-2xl font-bold mb-2">Bienvenue ${currentUser.nom}</h2>
                    <p class="text-gray-600 mb-6">Rôle : ${roleText}</p>
                    <div class="space-y-3">
                        <button class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold" onclick="alert('Fonctionnalité à venir')">
                            <i class="fas fa-bus mr-2"></i>Continuer (simulation)
                        </button>
                        <button id="logout-btn" class="w-full bg-gray-200 text-gray-800 py-4 rounded-lg font-bold">
                            <i class="fas fa-sign-out-alt mr-2"></i>Déconnexion
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('logout-btn').addEventListener('click', () => {
                currentUser = null;
                currentRole = null;
                renderLogin();
            });
        }
        
        // --- DÉMARRAGE IMMÉDIAT ---
        renderLogin();
        
    })();
</script>

</body>
</html>
