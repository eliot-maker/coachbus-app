<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachBus - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen flex items-center justify-center p-4">
        <div class="w-full bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-6">
                <i class="fas fa-bus text-5xl text-blue-600 mb-3"></i>
                <h1 class="text-2xl font-bold">Coach du Samedi</h1>
                <p class="text-gray-500 mt-1">Connectez-vous avec votre identifiant</p>
            </div>
            <input type="text" id="identifiant" placeholder="ex: julien, marie" class="w-full p-4 border rounded-lg text-lg mb-4" autofocus>
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-lg">
                <i class="fas fa-arrow-right mr-2"></i>Accéder
            </button>
            <p class="text-xs text-center text-gray-400 mt-6">
                superadmin, marie (admin), julien (coach)
            </p>
            <div id="error-msg" class="text-red-500 text-sm mt-3 text-center"></div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('login-btn').addEventListener('click', async () => {
            const identifiant = document.getElementById('identifiant').value.trim();
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = '';

            if (!identifiant) {
                errorDiv.textContent = 'Veuillez entrer un identifiant';
                return;
            }

            // Super admin
            if (identifiant.toLowerCase() === 'superadmin') {
                localStorage.setItem('coachbus_user', JSON.stringify({
                    id: 'super',
                    identifiant_simple: 'superadmin',
                    nom: 'Super Admin',
                    role: 'super-admin'
                }));
                window.location.href = 'admin.html';
                return;
            }

            try {
                const { data: coach, error } = await supabase
                    .from('Coachs')
                    .select('*')
                    .eq('Identifiant_Simple', identifiant)
                    .maybeSingle();

                if (error) {
                    if (error.code === '42P01') {
                        errorDiv.textContent = 'Tables non créées. Exécutez le script SQL dans Supabase.';
                    } else {
                        errorDiv.textContent = 'Erreur: ' + error.message;
                    }
                    return;
                }

                if (!coach) {
                    errorDiv.textContent = 'Identifiant inconnu';
                    return;
                }

                localStorage.setItem('coachbus_user', JSON.stringify({
                    id: coach.ID,
                    identifiant_simple: coach.Identifiant_Simple,
                    nom: coach.Nom,
                    role: coach.Role || 'coach'
                }));

                if (coach.Role === 'admin' || coach.Role === 'super-admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'coach.html';
                }
            } catch (e) {
                errorDiv.textContent = 'Erreur: ' + e.message;
            }
        });

        document.getElementById('identifiant').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });

        // Redirection si déjà connecté
        const userStr = localStorage.getItem('coachbus_user');
        if (userStr) {
            const user = JSON.parse(userStr);
            if (user.role === 'admin' || user.role === 'super-admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'coach.html';
            }
        }
    </script>
</body>
</html>
