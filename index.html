<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachBus - Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>Test de connexion</h2>
    <input type="text" id="identifiant" placeholder="Identifiant" style="padding:10px;font-size:16px;width:100%;margin-bottom:10px;">
    <button id="login-btn" style="padding:15px;font-size:18px;width:100%;background:blue;color:white;border:none;">Accéder</button>
    <div id="status" style="margin-top:20px;color:gray;"></div>

    <script>
        const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
        
        const statusDiv = document.getElementById('status');
        const log = (msg) => { statusDiv.innerHTML += '<br>' + msg; console.log(msg); };
        
        log('Initialisation Supabase...');
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('✅ Client créé');

        document.getElementById('login-btn').addEventListener('click', async () => {
            const identifiant = document.getElementById('identifiant').value.trim();
            log('Identifiant saisi : "' + identifiant + '"');
            
            if (!identifiant) {
                alert('Veuillez entrer un identifiant');
                return;
            }

            // Test superadmin
            if (identifiant.toLowerCase() === 'superadmin') {
                log('➡️ Superadmin détecté');
                try {
                    localStorage.setItem('coachbus_user', JSON.stringify({ id: 'super', nom: 'Super Admin', role: 'super-admin' }));
                    log('✅ localStorage OK');
                    alert('Redirection vers admin.html (superadmin)');
                    window.location.href = 'admin.html';
                } catch(e) {
                    alert('Erreur localStorage : ' + e.message);
                }
                return;
            }

            log('🔍 Recherche dans la table Coachs...');
            try {
                const { data, error } = await supabase
                    .from('Coachs')
                    .select('*')
                    .eq('Identifiant_Simple', identifiant)
                    .maybeSingle();

                if (error) {
                    log('❌ Erreur Supabase : ' + error.message + ' (code: ' + error.code + ')');
                    alert('Erreur Supabase : ' + error.message);
                    return;
                }

                if (!data) {
                    log('❌ Aucun coach trouvé');
                    alert('Identifiant inconnu');
                    return;
                }

                log('✅ Coach trouvé : ' + data.Nom + ' (rôle: ' + data.Role + ')');
                
                const user = {
                    id: data.ID,
                    identifiant_simple: data.Identifiant_Simple,
                    nom: data.Nom,
                    role: data.Role || 'coach'
                };
                
                try {
                    localStorage.setItem('coachbus_user', JSON.stringify(user));
                    log('✅ localStorage OK');
                } catch(e) {
                    alert('Erreur localStorage : ' + e.message);
                    return;
                }

                if (user.role === 'admin' || user.role === 'super-admin') {
                    log('➡️ Redirection vers admin.html');
                    alert('Redirection vers admin.html');
                    window.location.href = 'admin.html';
                } else {
                    log('➡️ Redirection vers coach.html');
                    alert('Redirection vers coach.html');
                    window.location.href = 'coach.html';
                }
            } catch (e) {
                log('❌ Exception : ' + e.message);
                alert('Exception : ' + e.message);
            }
        });
    </script>
</body>
</html>
