<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CoachBus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-6">
            <i class="fas fa-bus text-5xl text-blue-600 mb-3"></i>
            <h1 class="text-2xl font-bold text-gray-800">CoachBus</h1>
        </div>
        <input type="text" id="identifiant" placeholder="Votre identifiant" class="w-full p-4 border border-gray-300 rounded-lg text-lg mb-4 focus:ring-2 focus:ring-blue-500" autofocus>
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg text-lg transition">
            <i class="fas fa-arrow-right mr-2"></i>Accéder
        </button>
        <div id="error-msg" class="text-red-500 text-sm mt-3 text-center"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://otuymkznwiidookrqfhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iF0rYqW3cGiYK9kdELy1HA_DALrOIRF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginBtn = document.getElementById('login-btn');
        const input = document.getElementById('identifiant');
        const errorDiv = document.getElementById('error-msg');

        async function handleLogin() {
            const identifiant = input.value.trim();
            errorDiv.textContent = '';

            if (!identifiant) {
                errorDiv.textContent = 'Veuillez entrer un identifiant';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Connexion...';

            // Super admin (hardcodé)
            if (identifiant.toLowerCase() === 'superadmin') {
                localStorage.setItem('coachbus_user', JSON.stringify({
                    id: 'super',
                    identifiant_simple: 'superadmin',
                    nom: 'Super Admin',
                    role: 'super-admin'
                }));
                window.location.href = 'admin.html';
                return;
            }

            try {
                const { data: coach, error } = await supabase
                    .from('Coachs')
                    .select('*')
                    .eq('Identifiant_Simple', identifiant)
                    .maybeSingle();

                if (error) {
                    if (error.code === '42P01') {
                        errorDiv.textContent = 'Tables non créées. Exécutez le script SQL.';
                    } else {
                        errorDiv.textContent = 'Erreur: ' + error.message;
                    }
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-arrow-right mr-2"></i>Accéder';
                    return;
                }

                if (!coach) {
                    errorDiv.textContent = 'Identifiant inconnu';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-arrow-right mr-2"></i>Accéder';
                    return;
                }

                localStorage.setItem('coachbus_user', JSON.stringify({
                    id: coach.ID,
                    identifiant_simple: coach.Identifiant_Simple,
                    nom: coach.Nom,
                    role: coach.Role || 'coach'
                }));

                if (coach.Role === 'admin' || coach.Role === 'super-admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'coach.html';
                }
            } catch (e) {
                errorDiv.textContent = 'Erreur: ' + e.message;
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-arrow-right mr-2"></i>Accéder';
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Redirection si déjà connecté
        const userStr = localStorage.getItem('coachbus_user');
        if (userStr) {
            const user = JSON.parse(userStr);
            if (user.role === 'admin' || user.role === 'super-admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'coach.html';
            }
        }
    </script>
</body>
</html>
